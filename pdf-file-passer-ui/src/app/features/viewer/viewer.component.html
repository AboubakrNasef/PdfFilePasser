<div class="viewer-wrapper">
  <div class="viewer-tabs">
         @for (method of allowedMethods(); track method.id)
         {
    <button
      (click)="selectMethod(method.id)"
      [class.active]="selectedMethod() === method.id"
      class="tab-button">
      <span class="icon">{{ method.icon }}</span>
      <span class="label">{{ method.label }}</span>
    </button>}
  </div>

  <div class="viewer-content">
    @if (selectedMethod() === 'bytes') {
      <app-blob-viewer />
    } @else if (selectedMethod() === 'blobstorage-stream') {
      <app-blob-stream-viewer />
    } @else if (selectedMethod() === 'memory-stream') {
      <app-memory-stream-viewer />
    }
  </div>
</div>
